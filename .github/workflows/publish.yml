name: Publish to crates.io

# Tag-driven release: pushing a version tag `vX.Y.Z` builds, publishes to crates.io, and cuts a
# GitHub Release. It does NOT re-run the release gates (fmt/clippy/test/coverage) — those already
# ran on the PR that merged this tree (ci.yml, against the main-merged tree, §2.4a). A normal push
# to `main` runs the gates only (see ci.yml) — it does NOT publish. Mirrors the sibling DIG crates
# (dig-nat / dig-dht / dig-pex) so the same org secrets apply.
#
# RELEASE ORDERING (ecosystem rule: release-first for shared contracts): the published build depends
# on the crates.io `dig-nat` and `dig-dht` (which themselves depend on the crates.io `dig-constants`).
# dig-constants, dig-nat and dig-dht must be published to crates.io — and the `git` sources for
# `dig-nat` / `dig-dht` in Cargo.toml swapped for the plain crates.io versions — BEFORE
# dig-peer-selector is published, or the publish step (correctly) fails on the unresolved git
# dependency (`cargo publish` rejects a git dependency). The orchestrator sequences the release tags.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # NOTE (#489/#488): this workflow does NOT re-run fmt/clippy/test/coverage — the PR that merged
  # this tree already ran the full release-gate set in ci.yml (against the main-merged tree, §2.4a),
  # so re-running the whole suite here only re-tests what's already green and — before this fix —
  # was blocking releases on transient/flaky failures unrelated to the tag push. This job is
  # build + package + publish only.
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify the package builds
        run: cargo build --release

      - name: Verify the package can be packaged
        run: cargo package --locked

      - name: Check CARGO_REGISTRY_TOKEN is set
        run: |
          if [ -z "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]; then
            echo "CARGO_REGISTRY_TOKEN secret is not set in repository settings"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "dig-peer-selector v${{ steps.extract_version.outputs.VERSION }}"
          body: |
            ## dig-peer-selector v${{ steps.extract_version.outputs.VERSION }}

            Self-optimizing peer-selection middleware for the DIG Node — the pure decision + learning
            layer between `dig-download` and the discovery layers (`dig-dht` / `dig-gossip` /
            `dig-nat`). Maintains a dynamic peer registry, learns each peer's throughput / RTT /
            reliability + a per-class saturation point + an adaptive relayed penalty from the REAL
            measured outcome of every transfer (measured-only, non-gameable), and ranks a candidate
            subset per content request to minimize P99 latency without thundering-herd. No
            user-facing knobs; re-uses the transport-verified `peer_id = SHA-256(TLS SPKI DER)`.

            ### Installation
            ```toml
            [dependencies]
            dig-peer-selector = "${{ steps.extract_version.outputs.VERSION }}"
            ```
          draft: false
          prerelease: false
